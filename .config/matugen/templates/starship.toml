# Generated by matugen — do not edit
format = """
[░▒▓](fg:{{colors.primary_fixed_dim.default.hex}})\
[ 🐧 ](bg:{{colors.primary_fixed_dim.default.hex}} fg:{{colors.surface.default.hex}})\
[](bg:{{colors.primary.default.hex}} fg:{{colors.primary_fixed_dim.default.hex}})\
$directory\
[](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container_high.default.hex}})\
$git_branch\
$git_status\
[](fg:{{colors.surface_container_high.default.hex}} bg:{{colors.surface_container.default.hex}})\
$nodejs\
$rust\
$golang\
$php\
[](fg:{{colors.surface_container.default.hex}} bg:{{colors.surface_container_low.default.hex}})\
$time\
[ ](fg:{{colors.surface_container_low.default.hex}})\
\n$character"""

[directory]
style = "fg:{{colors.on_surface.default.hex}} bg:{{colors.primary.default.hex}}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:{{colors.surface_container_high.default.hex}}"
format = '[[ $symbol $branch ](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container_high.default.hex}})]($style)'

[git_status]
style = "bg:{{colors.surface_container_high.default.hex}}"
format = '[[($all_status$ahead_behind )](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container_high.default.hex}})]($style)'

[nodejs]
symbol = ""
style = "bg:{{colors.surface_container.default.hex}}"
format = '[[ $symbol ($version) ](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container.default.hex}})]($style)'

[rust]
symbol = ""
style = "bg:{{colors.surface_container.default.hex}}"
format = '[[ $symbol ($version) ](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container.default.hex}})]($style)'

[golang]
symbol = ""
style = "bg:{{colors.surface_container.default.hex}}"
format = '[[ $symbol ($version) ](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container.default.hex}})]($style)'

[php]
symbol = ""
style = "bg:{{colors.surface_container.default.hex}}"
format = '[[ $symbol ($version) ](fg:{{colors.primary.default.hex}} bg:{{colors.surface_container.default.hex}})]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:{{colors.surface_container_low.default.hex}}"
format = '[[  $time ](fg:{{colors.on_surface_variant.default.hex}} bg:{{colors.surface_container_low.default.hex}})]($style)'
