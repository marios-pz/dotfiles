[directory]
style = "fg:#f1dfdb bg:#ffb4a8"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#322826"
format = '[[ $symbol $branch ](fg:#ffb4a8 bg:#322826)]($style)'

[git_status]
style = "bg:#322826"
format = '[[($all_status$ahead_behind )](fg:#ffb4a8 bg:#322826)]($style)'

[nodejs]
symbol = ""
style = "bg:#271d1c"
format = '[[ $symbol ($version) ](fg:#ffb4a8 bg:#271d1c)]($style)'

[rust]
symbol = ""
style = "bg:#271d1c"
format = '[[ $symbol ($version) ](fg:#ffb4a8 bg:#271d1c)]($style)'

[golang]
symbol = ""
style = "bg:#271d1c"
format = '[[ $symbol ($version) ](fg:#ffb4a8 bg:#271d1c)]($style)'

[php]
symbol = ""
style = "bg:#271d1c"
format = '[[ $symbol ($version) ](fg:#ffb4a8 bg:#271d1c)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#231918"
format = '[[  $time ](fg:#d8c2be bg:#231918)]($style)'
