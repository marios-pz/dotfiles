[directory]
style = "fg:#f1dfda bg:#ffb59d"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#322825"
format = '[[ $symbol $branch ](fg:#ffb59d bg:#322825)]($style)'

[git_status]
style = "bg:#322825"
format = '[[($all_status$ahead_behind )](fg:#ffb59d bg:#322825)]($style)'

[nodejs]
symbol = ""
style = "bg:#271d1a"
format = '[[ $symbol ($version) ](fg:#ffb59d bg:#271d1a)]($style)'

[rust]
symbol = ""
style = "bg:#271d1a"
format = '[[ $symbol ($version) ](fg:#ffb59d bg:#271d1a)]($style)'

[golang]
symbol = ""
style = "bg:#271d1a"
format = '[[ $symbol ($version) ](fg:#ffb59d bg:#271d1a)]($style)'

[php]
symbol = ""
style = "bg:#271d1a"
format = '[[ $symbol ($version) ](fg:#ffb59d bg:#271d1a)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#231917"
format = '[[  $time ](fg:#d8c2bb bg:#231917)]($style)'
