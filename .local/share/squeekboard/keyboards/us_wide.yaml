---
# Split QWERTY (landscape). Overrides the built-in "us_wide" layout.
# Gap sits at the classic ergo split points: t|y, g|h, b|n.
# See ../../../../.config/niri/scripts/tablet-mode.sh for how squeekboard is launched.
outlines:
    default:   { width: 54,  height: 42 }
    altline:   { width: 81,  height: 42 }
    wide:      { width: 108, height: 42 }
    spaceline: { width: 216, height: 42 }
    special:   { width: 54,  height: 42 }
    gap:       { width: 100, height: 42 }

views:
    base:
        - "q w e r t gap y u i o p"
        - "a s d f g gap h j k l"
        - "Shift_L z x c v b gap n m BackSpace"
        - "show_numbers preferences         space        . Return"
    upper:
        - "Q W E R T gap Y U I O P"
        - "A S D F G gap H J K L"
        - "Shift_L Z X C V B gap N M BackSpace"
        - "show_numbers preferences         space        . Return"
    numbers:
        - "1 2 3 4 5 gap 6 7 8 9 0"
        - "@ # $ % & gap - _ + ( )"
        - "show_symbols , \" ' colon gap ; ! ?  BackSpace"
        - "show_letters preferences         space        . Return"
    symbols:
        - "~ ` | · √ gap π τ ÷ × ¶"
        - "© ® £ € ¥ gap ^ ° * { }"
        - "show_numbers_from_symbols \\ / < gap > = [ ]  BackSpace"
        - "show_letters preferences         space        . Return"

buttons:
    gap:
        outline: "gap"
        text: ""
    Shift_L:
        action:
            locking:
                lock_view: "upper"
                unlock_view: "base"
        outline: "altline"
        icon: "key-shift"
    BackSpace:
        outline: "altline"
        icon: "edit-clear-symbolic"
        action: "erase"
    preferences:
        action: "show_prefs"
        outline: "special"
        icon: "keyboard-mode-symbolic"
    show_numbers:
        action:
            set_view: "numbers"
        outline: "wide"
        label: "123"
    show_numbers_from_symbols:
        action:
            set_view: "numbers"
        outline: "altline"
        label: "123"
    show_letters:
        action:
            set_view: "base"
        outline: "wide"
        label: "ABC"
    show_symbols:
        action:
            set_view: "symbols"
        outline: "altline"
        label: "*/="
    ".":
        outline: "special"
        text: "."
    space:
        outline: "spaceline"
        text: " "
    Return:
        outline: "wide"
        icon: "key-enter"
        keysym: "Return"
    colon:
        text: ":"
